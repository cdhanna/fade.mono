<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fade WebRuntime.MonoGame — Standalone</title>
    <base href="./" />
    <link href="css/app.css" rel="stylesheet" />
    <style>
        /* Suppress Blazor's default error overlay. Playground forwards
           errors to the host page's Output panel via postMessage
           (type: 'game-error'); standalone exports surface them via
           the friendly splash's error state. Either way, the in-iframe
           "An unhandled error has occurred" banner is just visual noise. */
        #blazor-error-ui { display: none !important; }

        /* ── Boot splash ───────────────────────────────────────────────
           Ghost-in-and-out-of-house animation + status line shown over
           the canvas while Blazor mounts and LoadProgram runs. Visible
           in BOTH modes:
             - Preview (Playground iframe): hidden once the parent sends
               run-start-source / debug-start* and LoadProgram succeeds.
             - Standalone (deployed export): hidden once the self-boot
               path completes its LoadProgram.
           Initial visibility is unconditional so the first paint of the
           iframe is the friendly splash, not a black canvas or the
           dev-era boot-stub status text. */
        #fade-splash {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: radial-gradient(ellipse at center, #2a2a2a 0%, #161616 70%, #0a0a0a 100%);
            color: #b5b5b5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            transition: opacity 220ms ease-out;
        }
        #fade-splash.is-hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* Abstract house + ghost + zzz's assembled from plain <div>s
           and a few text spans (for the z's). No emoji, no SVG, no image
           assets — just border-radius, clip-path, and transforms.

           The loop:
             0%–18%   Ghost slides from off-screen left toward the house
                      (constant Y, pure translateX).
             18%–22%  Ghost fades into the house wall (still at the same
                      Y; no curved motion).
             22%–34%  House lights blink on; body does a quick scared
                      jump; the roof pops up and tilts.
             34%–48%  House settles; lights still on; ghost is invisible.
             48%–62%  Ghost emerges from the right wall, slides right
                      while scaling up + fading (zoom-out exit).
             62%–80%  Lights fade out; zzz's float up from the house.
             80%–100% Quiet beat, then ghost begins to reset at far
                      left for the next loop.

           Single 5.4s loop driving every element through its own
           @keyframes — synced via shared animation-duration. */
        #fade-splash .splash-scene {
            position: relative;
            width: 240px;
            height: 150px;
            margin: 0 auto;
        }
        #fade-splash .splash-house {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 90px;
            height: 100px;
            filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.45));
            animation: splash-house-jump 5.4s ease-in-out infinite;
            z-index: 1;
        }
        #fade-splash .splash-roof {
            position: absolute;
            top: 0;
            left: 50%;
            transform-origin: 50% 100%;
            transform: translateX(-50%);
            width: 90px;
            height: 40px;
            background: #4a4a4a;
            clip-path: polygon(50% 0, 0 100%, 100% 100%);
            animation: splash-roof-pop 5.4s ease-in-out infinite;
        }
        #fade-splash .splash-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 76px;
            height: 60px;
            background: #6b6b6b;
            /* Squared off — was 3px/4px rounded before. */
            border-radius: 0;
        }
        #fade-splash .splash-window {
            /* Boxy square window. Dark when "off", warm grey + glow when
               the lights come on. */
            position: absolute;
            bottom: 32px;
            left: 50%;
            margin-left: -23px;
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 0;
            animation: splash-window-light 5.4s ease-in-out infinite;
        }
        #fade-splash .splash-door {
            position: absolute;
            bottom: 0;
            left: 50%;
            margin-left: -8px;
            width: 16px;
            height: 26px;
            background: #2a2a2a;
            border-radius: 0;
        }
        #fade-splash .splash-ghost {
            /* Ghost: tall rounded dome, three scalloped humps at the
               bottom. Sits behind the house (z-index: 0). */
            position: absolute;
            bottom: 22px;
            left: 50%;
            margin-left: -19px;
            width: 38px;
            height: 48px;
            background: #b0b0b0;
            clip-path: path('M 0 22 C 0 0, 38 0, 38 22 L 38 38 C 38 48, 32 48, 25 38 C 25 48, 19 48, 12 38 C 12 48, 6 48, 0 38 Z');
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.3));
            animation: splash-ghost-path 5.4s linear infinite;
            z-index: 0;
        }

        @keyframes splash-ghost-path {
            /* Translate + opacity only — ghost never scales or changes Y
               except during the exit wiggle.

               Timing (5.4s loop):
                 0–10%   slow fade-in at far left (longer ramp)
                 10–18%  slide toward the house entrance
                 18–22%  fade into the house wall
                 22–40%  inside; house startles 34–42%
                 40–42%  ghost re-emerges on right side
                 42–57%  wiggling exit: Y wobble while fading right
                 57–100% off-screen; snap back for next loop */
            0%   { transform: translate(-100px, 0); opacity: 0; }
            10%  { transform: translate(-100px, 0); opacity: 1; }
            18%  { transform: translate(-32px, 0);  opacity: 1; }
            22%  { transform: translate(-20px, 0);  opacity: 0; }
            40%  { transform: translate(20px, 0);   opacity: 0; }
            42%  { transform: translate(28px, 0);    opacity: 0.95; }
            46%  { transform: translate(54px, -3px);  opacity: 0.8; }
            50%  { transform: translate(82px, 2px);   opacity: 0.55; }
            54%  { transform: translate(108px, -1px); opacity: 0.25; }
            57%  { transform: translate(128px, 0);    opacity: 0; }
            100% { transform: translate(-100px, 0); opacity: 0; }
        }
        @keyframes splash-house-jump {
            /* Single slow startled hop — one clean arc up and back. */
            0%, 33%, 100% { transform: translateX(-50%) translateY(0); }
            40%   { transform: translateX(-50%) translateY(-12px); }
            50%   { transform: translateX(-50%) translateY(0); }
        }
        @keyframes splash-roof-pop {
            /* Single slow roof pop: rises with a left tilt, settles
               back with a slight right lean, then returns to rest. */
            0%, 33%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
            39%   { transform: translateX(-50%) translateY(-18px) rotate(-7deg); }
            46%   { transform: translateX(-50%) translateY(-4px) rotate(6deg); }
            51%   { transform: translateX(-50%) translateY(0) rotate(0deg); }
        }
        @keyframes splash-window-light {
            0%, 35% {
                background: #1a1a1a;
                box-shadow: none;
            }
            39%, 60% {
                background: #d8d4b8;
                box-shadow: 0 0 12px rgba(216, 212, 184, 0.55),
                            0 0 22px rgba(216, 212, 184, 0.25);
            }
            70%, 100% {
                background: #1a1a1a;
                box-shadow: none;
            }
        }

        /* Excitement lines bursting from near the roof peak during the
           startle. Three lines spread across the upper hemisphere,
           anchored at the roof area and radiating outward/upward.
           CSS custom property --a sets the rotation per element. */
        #fade-splash .splash-excite {
            position: absolute;
            top: 54px;    /* near the roof peak within 150px scene (roof is Y 50–90) */
            left: 50%;
            width: 22px;
            height: 2px;
            background: #888;
            border-radius: 1px;
            transform-origin: 0 50%;
            transform: rotate(var(--a)) translateX(40px);
            opacity: 0;
            animation: splash-excite-pulse 5.4s ease-out infinite;
        }
        @keyframes splash-excite-pulse {
            /* Fast fade-in, slow fade-out — no flashing. */
            0%, 35%  { opacity: 0; }
            38%      { opacity: 0.7; }
            55%      { opacity: 0; }
            100%     { opacity: 0; }
        }

        /* Sleepy zzz's that float up after the ghost leaves. Three
           letters, staggered, each on its own keyframe so they cascade
           upward instead of moving in lockstep. */
        #fade-splash .splash-z {
            position: absolute;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 600;
            font-style: italic;
            opacity: 0;
            pointer-events: none;
        }
        #fade-splash .splash-z1 {
            bottom: 100px;
            left: calc(50% - 22px);
            font-size: 14px;
            animation: splash-z1 5.4s ease-out infinite;
        }
        #fade-splash .splash-z2 {
            bottom: 100px;
            left: calc(50% - 4px);
            font-size: 17px;
            animation: splash-z2 5.4s ease-out infinite;
        }
        #fade-splash .splash-z3 {
            bottom: 100px;
            left: calc(50% + 14px);
            font-size: 20px;
            animation: splash-z3 5.4s ease-out infinite;
        }
        @keyframes splash-z1 {
            0%, 60% { opacity: 0; transform: translateY(0); }
            64%     { opacity: 0.85; transform: translateY(-2px); }
            76%     { opacity: 0.6;  transform: translateY(-14px); }
            86%, 100% { opacity: 0;  transform: translateY(-24px); }
        }
        @keyframes splash-z2 {
            0%, 68% { opacity: 0; transform: translateY(0); }
            72%     { opacity: 0.85; transform: translateY(-2px); }
            84%     { opacity: 0.6;  transform: translateY(-18px); }
            92%, 100% { opacity: 0;  transform: translateY(-26px); }
        }
        @keyframes splash-z3 {
            0%, 76% { opacity: 0; transform: translateY(0); }
            80%     { opacity: 0.85; transform: translateY(-2px); }
            92%     { opacity: 0.6;  transform: translateY(-20px); }
            100%    { opacity: 0;    transform: translateY(-28px); }
        }

        #fade-splash .splash-status {
            font-size: 0.95rem;
            color: #888;
            letter-spacing: 0.04em;
            min-height: 1.4rem;
            text-align: center;
            transition: color 180ms ease-out;
        }
        #fade-splash .splash-status.is-error { color: #d8a0a0; }
        /* In preview mode the outer Playground page shows its own boot
           splash. Pause all iframe splash animations until the parent
           signals its splash is gone (pg-splash-hidden postMessage), so
           the two animations are never simultaneously visible. */
        #fade-splash.splash-anim-paused * {
            animation-play-state: paused !important;
        }
        /* Hide the dev-era splashes in standalone — our overlay covers
           the same UX. Kept visible in preview so devs still see the
           live runtime _status field over the canvas. */
        .fade-standalone #app { display: none !important; }
        .fade-standalone #status { display: none !important; }
    </style>
</head>

<body>

    <!-- Decide standalone vs preview mode synchronously so the splash
         CSS picks the right hidden/visible state from the first paint.
         Without this inline check, the Blazor splash flashes on the
         deployed export before our friendlier overlay takes over. -->
    <script>
        if (!new URLSearchParams(location.search).has('preview')) {
            document.documentElement.classList.add('fade-standalone');
        } else {
            // Start animations paused in preview mode. The parent page sends
            // 'pg-splash-hidden' once its own boot splash finishes dimming out,
            // at which point we remove the class and animations begin. This
            // prevents both splashes from running simultaneously on first load.
            document.getElementById('fade-splash').classList.add('splash-anim-paused');
        }
    </script>

    <!-- Friendly boot splash. Shown in both preview and standalone
         modes; hidden once LoadProgram succeeds. Plain <div>s + text
         spans for the z's. The scene runs a five-phase loop:
         ghost-enters → house-startles → ghost-exits → zzz's-float
         → reset. See the CSS block in <head> for the keyframes. -->
    <div id="fade-splash" aria-live="polite">
        <div class="splash-scene" aria-hidden="true">
            <span class="splash-z splash-z1">z</span>
            <span class="splash-z splash-z2">z</span>
            <span class="splash-z splash-z3">z</span>
            <span class="splash-excite" style="--a: 210deg"></span>
            <span class="splash-excite" style="--a: 270deg"></span>
            <span class="splash-excite" style="--a: 330deg"></span>
            <div class="splash-house">
                <div class="splash-roof"></div>
                <div class="splash-body"></div>
                <div class="splash-window"></div>
                <div class="splash-door"></div>
            </div>
            <div class="splash-ghost"></div>
        </div>
        <div class="splash-status" id="fade-splash-status">Booting Fade Basic</div>
    </div>

    <!-- Splash visible until Blazor mounts and replaces #mg-blazor-root's contents. -->
    <div id="app">
        <div class="boot-splash">
            <div>loading WebRuntime.MonoGame…</div>
            <div class="boot-splash-sub">Standalone test: a color-clear canvas means KNI + Game1 are alive. Use the browser console to call <code>window.theInstance.invokeMethodAsync('LoadProgram', source)</code> to run a Fade program.</div>
        </div>
    </div>

    <!-- Blazor mounts WebRuntime.MonoGame.App into this div (selector in Program.cs).
         A separate root from #app keeps the boot splash visible until Blazor
         takes over, and avoids collision when this runtime is loaded inline
         into the Playground page (which uses its own #app). -->
    <div id="mg-blazor-root"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">x</a>
    </div>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <!-- Standalone-export debug inspector. Self-gates on the
         `?inspector=1` URL param or `window.__fadeShowInspector`, so
         normal exports never see it. Loads Tweakpane via CDN on
         first activation. -->
    <script src="debug-inspector.js" defer></script>
    <script>
        // ── Splash control surface ──────────────────────────────────────
        // Exposed early so both the preview-mode handlers (below) and
        // the standalone-mode boot (further below) can drive it.
        window.__fadeSplash = (function () {
            const el = document.getElementById('fade-splash');
            const statusEl = document.getElementById('fade-splash-status');
            let hidden = false;
            return {
                setStatus(text, isError) {
                    if (!statusEl) return;
                    statusEl.textContent = text;
                    statusEl.classList.toggle('is-error', !!isError);
                },
                hide() {
                    if (!el || hidden) return;
                    hidden = true;
                    el.classList.add('is-hidden');
                    setTimeout(() => { if (el) el.style.display = 'none'; }, 260);
                },
                // Re-display the splash for subsequent Runs. The first
                // boot left it visible by default; this is for the
                // "user clicked Run again with a new MP3 in the project"
                // case where asset decoding takes a beat and we want a
                // visible loading state IN the game canvas.
                show() {
                    if (!el) return;
                    hidden = false;
                    el.style.display = '';
                    el.classList.remove('is-hidden');
                    if (statusEl) statusEl.classList.remove('is-error');
                },
                isHidden() { return hidden; },
            };
        })();

        // ── stdout / stderr forwarding ─────────────────────────────────
        // Standard fbasic `print` is bound to FadeBasic.Lib.Standard's
        // ConsoleCommands which calls System.Console.WriteLine → Blazor's
        // WASM runtime → globalThis.console.log. Hook console.log/.warn/
        // .error here so user `print` output and runtime-side messages
        // (e.g. '[fade] texture load failed') stream into the host
        // Playground's Output panel via postMessage.
        //
        // Gated on `__fadeForwardingArmed` (flipped true in initRenderJS)
        // so Blazor's noisy boot logs don't flood the host before the
        // user has even hit Run. Preview-mode only; standalone keeps
        // its raw console behavior (everything visible to dev tools).
        window.__fadeForwardingArmed = false;
        (function () {
            const inPreview = new URLSearchParams(location.search).has('preview');
            if (!inPreview) return;
            const orig = {
                log: console.log.bind(console),
                warn: console.warn.bind(console),
                error: console.error.bind(console),
            };
            const stringify = (args) => args.map((a) =>
                typeof a === 'string' ? a
                : (a && a.message) ? a.message
                : (() => { try { return JSON.stringify(a); } catch { return String(a); } })()
            ).join(' ');
            const isInternal = (text) =>
                text.startsWith('[fade-monogame') ||
                text.startsWith('[WebRuntime.MonoGame');
            const forward = (channel, args) => {
                if (!window.__fadeForwardingArmed) return;
                const line = stringify(args);
                if (isInternal(line)) return;
                try { window.parent.postMessage({ type: channel, line }, '*'); }
                catch { /* parent may be cross-origin */ }
            };
            console.log = (...args) => { orig.log(...args); forward('stdout', args); };
            console.warn = (...args) => { orig.warn(...args); forward('stderr', args); };
            console.error = (...args) => { orig.error(...args); forward('stderr', args); };
        })();

        // ── Debug UI bridge (C# DebugUISystem ↔ Tweakpane panel) ──────
        // DebugUISystem.FrameSink (wired in Pages/Index.razor.cs) calls
        // fadeDebugUi.frame(json) once per game frame with the queued
        // debug envelope as JSON. The same call fans out to two
        // possible consumers:
        //
        //  1. The parent Playground via postMessage. In standalone
        //     exports there's no parent listening; the postMessage
        //     just no-ops.
        //
        //  2. The in-page overlay panel, when the user has opted in
        //     via `window.fadeDebug.enable()` or the `?debug=1` URL
        //     flag. The panel module lives in debug-ui-panel.js and
        //     is loaded lazily on first enable.
        //
        // Iframe→parent uses a DIFF protocol: we parse the envelope on
        // this side, compare to the last one we sent, and ship only the
        // fields that changed (as 'debug-ui-frame-delta'). Saves the
        // structured-clone + parse cost on the parent for fields that
        // are stable across frames (typically queue + entities, since
        // widget structure and entity composition don't change every
        // frame — only metadata does). First emission goes as a
        // baseline (full envelope with `baseline: true`) so the parent
        // has a complete starting state.
        //
        // The local-panel branch below still receives the full envelope
        // every frame because it has no parse to skip (the panel's
        // applyFrameEnvelope does its own internal dedup via gen + a
        // queue-structure hash).
        const localPanelState = { handle: null, container: null, mode: 'corner' };
        // Subscription flag: parent toggles this via the
        // 'debug-ui-subscribe' message when its Debug UI dock tab
        // becomes visible / hidden. When BOTH the parent is not
        // subscribed AND there's no local overlay panel, the
        // fadeDebugUi.frame call below short-circuits without
        // parsing the envelope or sending any postMessage. C# can
        // also poll window.fadeDebugUi.isSubscribed() to skip the
        // snapshot work upstream (the bigger win — the iframe-side
        // no-op only saves transport + parse). Default true at boot
        // so we don't drop envelopes during the parent's first few
        // frames before its visibility hook fires; parent will set
        // false within a tick or two if its panel is hidden.
        let parentSubscribed = true;
        const debugUiDiff = (() => {
            let last = null;
            function eqVal(a, b) {
                if (a === b) return true;
                if (a == null || b == null) return a == b;
                if (typeof a !== typeof b) return false;
                if (typeof a !== 'object') return false;
                if (Array.isArray(a)) {
                    if (!Array.isArray(b) || a.length !== b.length) return false;
                    for (let i = 0; i < a.length; i++) if (!eqVal(a[i], b[i])) return false;
                    return true;
                }
                if (Array.isArray(b)) return false;
                const ak = Object.keys(a), bk = Object.keys(b);
                if (ak.length !== bk.length) return false;
                for (const k of ak) if (!eqVal(a[k], b[k])) return false;
                return true;
            }
            function compute(json) {
                let env;
                try { env = JSON.parse(json); } catch { return null; }
                if (!env || typeof env !== 'object') return null;
                // Normalise common shapes so the parent's merger gets
                // predictable fields. Treat the legacy "bare queue array"
                // shape the same way the existing parser does.
                if (Array.isArray(env)) env = { gen: 0, queue: env, autoInspector: false };
                const prev = last;
                last = env;
                if (!prev) {
                    return {
                        baseline: true,
                        gen: env.gen ?? 0,
                        queue: env.queue ?? [],
                        autoInspector: !!env.autoInspector,
                        metadata: env.metadata ?? null,
                        entities: env.entities ?? null,
                    };
                }
                const d = {};
                let changed = false;
                if (env.gen !== prev.gen) { d.gen = env.gen; changed = true; }
                if (!!env.autoInspector !== !!prev.autoInspector) {
                    d.autoInspector = !!env.autoInspector; changed = true;
                }
                if (!eqVal(env.queue ?? [], prev.queue ?? [])) {
                    d.queue = env.queue ?? []; changed = true;
                }
                if (!eqVal(env.metadata ?? null, prev.metadata ?? null)) {
                    d.metadata = env.metadata ?? null; changed = true;
                }
                if (!eqVal(env.entities ?? null, prev.entities ?? null)) {
                    d.entities = env.entities ?? null; changed = true;
                }
                return changed ? d : null;
            }
            return { compute };
        })();
        window.fadeDebugUi = {
            frame(json) {
                // Short-circuit when no consumer exists. The C# side still
                // does its snapshot work — for the FULL win, C# should
                // check isSubscribed() below before generating the
                // envelope at all.
                if (!parentSubscribed && !localPanelState.handle) return;
                const delta = parentSubscribed ? debugUiDiff.compute(json) : null;
                if (delta) {
                    try { window.parent.postMessage({ type: 'debug-ui-frame-delta', delta }, '*'); }
                    catch { /* parent may be cross-origin, or no parent in standalone */ }
                }
                if (localPanelState.handle) {
                    try {
                        const env = localPanelState.parse(json);
                        localPanelState.handle.applyFrameEnvelope(env);
                    } catch (e) { console.warn('[fadeDebug] applyFrameEnvelope threw', e); }
                }
            },
            /** True when any consumer wants per-frame envelopes (the
             *  parent has signaled its Debug UI tab is visible, or the
             *  local overlay panel is mounted). C# polls this once per
             *  frame in DebugUISystem.FrameSink and skips the snapshot
             *  entirely when false — that's where the real perf win
             *  comes from. The JS-side short-circuit above only saves
             *  the postMessage + parent parse cost. */
            isSubscribed() {
                return parentSubscribed || !!localPanelState.handle;
            },
        };

        // ── window.fadeDebug: opt-in debug overlay ────────────────────
        // Activated either by `?debug=1` (auto on boot, or
        // `?debug=corner` / `?debug=sidebar` for an explicit mode),
        // or by typing `fadeDebug.enable()` in the dev console.
        // Stays off by default in both Playground and standalone
        // exports so there's no double panel during normal use.
        function applyOverlayLayout() {
            const c = localPanelState.container;
            if (!c) return;
            c.style.position = 'fixed';
            c.style.zIndex = '99999';
            c.style.background = '#181818ee';
            c.style.color = '#ddd';
            c.style.font = '11px ui-monospace, SFMono-Regular, Menlo, monospace';
            c.style.boxShadow = '0 6px 24px #0008';
            c.style.border = '1px solid #ffffff22';
            c.style.borderRadius = '4px';
            c.style.overflow = 'hidden';
            if (localPanelState.mode === 'sidebar') {
                c.style.top = '0';
                c.style.right = '0';
                c.style.bottom = '0';
                c.style.left = '';
                c.style.width = 'min(420px, 40vw)';
                c.style.height = '';
                c.style.maxHeight = '';
                c.style.resize = 'horizontal';
            } else {
                c.style.top = '12px';
                c.style.right = '12px';
                c.style.bottom = '';
                c.style.left = '';
                c.style.width = '380px';
                c.style.height = '';
                c.style.maxHeight = 'calc(100vh - 24px)';
                c.style.resize = 'both';
            }
        }

            if (localPanelState.handle) {

            disable() { disableLocalPanel(); },

        // boot. The query param is checked once at script load — the
        // Playground iframe URL doesn't include it, so the overlay
        // stays off in Playground unless the user explicitly opts in.

        // posture; leniency is intentional so first-boot Initialize()/LoadContent()
        // don't false-positive.
        const WATCHDOG_FRAME_MS = 5000;

        // ── rAF tick loop ────────────────────────────────────────────────────
        // .NET does NOT own the game loop. JS does. Per frame:
        //   1. Sync canvas drawing-buffer to its container's pixel size.
        //   2. Notify .NET of any size change via OnCanvasResized.
        //   3. Call TickDotNet() — one Game.Tick() (Update + Draw).
        //   4. If the tick exceeded WATCHDOG_FRAME_MS, call OnGameTimedOut so
        //      .NET drops its game reference. Subsequent ticks become no-ops.
        // Set to true when a fatal tick exception bubbles up through
        // invokeMethod('TickDotNet'). The tick loop bails so the same

        // (preview run-start-source / debug-start* / standalone reboot)
        // clears it and re-arms rAF.
        let tickHalted = false;

            const holder = document.getElementById('canvasHolder');

                const h = holder.clientHeight;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                    window.theInstance.invokeMethod('OnCanvasResized', w, h);

                    eventsJson = window.theInstance.invokeMethod('TickDotNet');
                } catch (e) {
                    // .NET-side exception bubbled through invokeMethod.
                    // Park rAF so we don't spam the error every frame.
                    // Preview: forward to parent for the host's Output
                    // panel. Standalone: surface in the splash so the
                    // user knows something broke.
                    tickHalted = true;

                    try {
                        window.parent.postMessage({ type: 'game-error', message: msg }, '*');
                    } catch { /* parent may be cross-origin */ }

                    }

                // tick produced (drain pattern from Pages/Index.razor.cs).
                // Forward each event to a registered listener if any — the
                // preview-mode relay below sets one up to bridge into the
                // parent window's postMessage channel. In standalone mode

        // decodeAudioData and serves playback through AudioBufferSourceNode +
        // Gain + StereoPanner. C# (BrowserAudioBridge) calls these via

        // round-trip needed because every method is local to the iframe.
        //

        // single-use per Web Audio spec but the surrounding graph
        // persists, so pan/volume/pitch carry across replays cleanly.
        window.fadeAudio = (function () {
            let _ctx = null;
            let _master = null;
            // name → AudioBuffer (decoded sources)
            const _bufferByName = new Map();
            // name → Promise<AudioBuffer> while decode is in flight
            const _decodingByName = new Map();
            // clipId (int) → name (string) — what `load sfx clip` associates
            const _clipNameById = new Map();
            // sfxId (int) → InstanceState
            const _instanceById = new Map();
            let _highestClipId = 0;
            let _highestInstanceId = 0;

            function stopAndDetachSource(inst) {

            // are single-use per Web Audio spec, so we re-create on
            // every play. Gain + panner persist on the instance so the
            // user's volume/pan/pitch settings survive replays.
            function startSource(inst, offsetSec) {

                src.buffer = inst.buffer;
                src.loop = inst.loop;
                src.playbackRate.value = pitchToRate(inst.pitch);

                inst.isPlaying = true;

                    _clipNameById.clear();
                    _bufferByName.clear();

                playWithDelay(sfxId, delayMs) {

                    if (!inst) return false;
                    stopAndDetachSource(inst);

                    // scheduling via ctx.currentTime is a future polish.
                    setTimeout(() => { if (_instanceById.get(sfxId) === inst) startSource(inst, 0); }, delayMs);

                },
                pause(sfxId) {

                    if (!inst || !inst.isPlaying || !inst.source) return false;
                    const ctx = _ctx;
                    if (!ctx) return false;
                    const offset = Math.max(0, ctx.currentTime - inst.startedAt);
                    stopAndDetachSource(inst);
                    inst.isPlaying = false;
                    inst.isPaused = true;
                    inst.pauseOffset = offset;
                    return true;
                },
                stop(sfxId) {
                    const inst = _instanceById.get(sfxId);
                    if (!inst) return false;
                    stopAndDetachSource(inst);
                    inst.isPlaying = false;
                    inst.isPaused = false;
                    inst.pauseOffset = 0;
                    return true;
                },

                // ── Settings (volume / pitch / pan / loop) ─────────
                setVolume(sfxId, vol) {
                    const inst = _instanceById.get(sfxId); if (!inst) return;
                    const v = Math.max(0, Math.min(1, vol));
                    inst.volume = v;
                    inst.gain.gain.value = v;
                },
                getVolume(sfxId) { return _instanceById.get(sfxId)?.volume ?? 0; },
                setPitch(sfxId, pitch) {
                    const inst = _instanceById.get(sfxId); if (!inst) return;
                    const p = Math.max(-1, Math.min(1, pitch));
                    inst.pitch = p;
                    if (inst.source) inst.source.playbackRate.value = pitchToRate(p);
                },
                getPitch(sfxId) { return _instanceById.get(sfxId)?.pitch ?? 0; },
                setPan(sfxId, pan) {
                    const inst = _instanceById.get(sfxId); if (!inst) return;
                    const p = Math.max(-1, Math.min(1, pan));
                    inst.pan = p;
                    inst.panner.pan.value = p;
                },
                getPan(sfxId) { return _instanceById.get(sfxId)?.pan ?? 0; },
                setLoop(sfxId, loop) {
                    const inst = _instanceById.get(sfxId); if (!inst) return;
                    const b = !!loop;
                    inst.loop = b;
                    if (inst.source) inst.source.loop = b;
                },

                // finished). Paused instances return false — they're
                // "not done", just waiting.
                isDone(sfxId) {
                    const inst = _instanceById.get(sfxId);
                    return !inst || !inst.isPlaying;
                },
            };
        })();

        // Library commands (HostBridge.PostMessage in C#) call into JS via

        // We dispatch by channel name and, when the handler returns a typed

            'real':   'DepositResultReal',
            'bool':   'DepositResultBool',
            'byte':   'DepositResultByte',
            'word':   'DepositResultWord',
            'dword':  'DepositResultDword',
            'dint':   'DepositResultDint',
            'dfloat': 'DepositResultDfloat',
            'void':   'DepositResultVoid',
        };

            const handler = window.fadeHostHandlers[channel];
            let reply;
            if (!handler) {
                console.warn('[fade-monogame] no host handler for channel:', channel);
                reply = { resultType: 'string', value: '' };
            } else {
                try {
                    reply = await handler(payload);
                } catch (e) {
                    console.error('[fade-monogame] host handler for', channel, 'threw:', e);
                    reply = { resultType: 'string', value: '' };
                }
            }
            const method = depositMethodForResultType[reply?.resultType] ?? 'DepositResultVoid';
            try {
                if (method === 'DepositResultVoid') {
                    await window.theInstance.invokeMethodAsync(method);
                } else {
                    await window.theInstance.invokeMethodAsync(method, reply.value);
                }
            } catch (e) {
                console.error('[fade-monogame] deposit', method, 'failed:', e);
            }
        };

        // ── Entry point from .NET ───────────────────────────────────────────
        // Pages/Index.razor.cs's OnAfterRender(firstRender:true) calls this via
        // IJSRuntime.InvokeVoidAsync("initRenderJS", dotNetRef). We store the
        // ref so tickJS can call back into .NET, apply the Blazor shims, set
        // up the canvas, and start the rAF loop.
        window.initRenderJS = function (instance) {
            applyBlazorKniShims();
            window.theInstance = instance;

            // Arm console-forwarding to the parent (preview mode only,
            // gated above). Past this point user `print` lines and
            // runtime warnings stream into the host's Output panel
            // without any Blazor boot chatter beforehand.
            window.__fadeForwardingArmed = true;

            if (window.__fadeSplash) window.__fadeSplash.setStatus('Runtime ready…');

            // Fade out the boot splash now that Blazor + KNI are fully mounted.
            // A short delay lets the status message read "Runtime ready…" briefly
            // before disappearing, then reveals the black canvas waiting for Run.
            // Any subsequent run-start-source / debug-start hide() calls are
            // no-ops (the hidden flag prevents double-hiding).
            setTimeout(() => { if (window.__fadeSplash) window.__fadeSplash.hide(); }, 400);

            // Hide the boot splash now that KNI + Game1 are alive. The Blazor
            // mount lives in a separate #mg-blazor-root so the splash sat
            // alongside until this moment — fade it out so the canvas shows.
            const splash = document.getElementById('app');
            if (splash) splash.style.display = 'none';

            const canvas = document.getElementById('theCanvas');
            const holder = document.getElementById('canvasHolder');
            if (!canvas || !holder) {
                console.error('[WebRuntime.MonoGame] canvas/holder missing — Index.razor markup did not render.');
                return;
            }

            canvas.width = holder.clientWidth;
            canvas.height = holder.clientHeight;
            // Disable browser context menu so right-click is available to the game.
            canvas.addEventListener('contextmenu', e => e.preventDefault());

            // Push the initial canvas size into .NET *before* the user's
            // program runs. Without this, GraphicsDeviceManager keeps its
            // KNI default (e.g. 800x480) at boot, so SetMainRenderSize
            // (called once from `set display W,H` in user code) computes
            // the letterbox transform against that stale value and the
            // 1920x1080 render lands in a small corner. tickJS only
            // calls OnCanvasResized when canvas dims differ from holder,
            // which is false on first frame (we just synced them), so
            // without this explicit call the initial size never makes
            // it across.
            try {
                window.theInstance.invokeMethod('OnCanvasResized', canvas.width, canvas.height);
            } catch (e) {
                console.warn('[WebRuntime.MonoGame] initial OnCanvasResized failed:', e);
            }

            // Belt-and-suspenders resize handling for cases tickJS can
            // miss — chiefly itch.io's fullscreen toggle, which can
            // resize the iframe between rAF callbacks (and may briefly
            // suspend rAF entirely during the transition). ResizeObserver
            // fires whenever the holder element's box changes, and we
            // re-sync the canvas + notify .NET right then. The tickJS
            // poll in the rAF loop still runs and is the redundant
            // safety net for layout shifts ResizeObserver doesn't pick
            // up (e.g. DPR changes without a box change).
            if (typeof ResizeObserver !== 'undefined') {
                const ro = new ResizeObserver(() => {
                    const w = holder.clientWidth;
                    const h = holder.clientHeight;
                    if (canvas.width !== w || canvas.height !== h) {
                        canvas.width = w;
                        canvas.height = h;
                        try {
                            window.theInstance.invokeMethod('OnCanvasResized', w, h);
                        } catch (e) { /* .NET may still be tearing down */ }
                    }
                });
                ro.observe(holder);
            }
            // Also listen for fullscreenchange — some browsers fire it
            // before the ResizeObserver callback, and explicit re-poll
            // here gets the new dimensions into .NET one frame sooner.
            const onFullscreenChange = () => {
                requestAnimationFrame(() => {
                    const w = holder.clientWidth;
                    const h = holder.clientHeight;
                    if (canvas.width !== w || canvas.height !== h) {
                        canvas.width = w;
                        canvas.height = h;
                        try {
                            window.theInstance.invokeMethod('OnCanvasResized', w, h);
                        } catch { /* ignore */ }
                    }
                });
            };
            document.addEventListener('fullscreenchange', onFullscreenChange);
            document.addEventListener('webkitfullscreenchange', onFullscreenChange);

            window.requestAnimationFrame(tickJS);
        };

        // ── Iframe preview-mode relay ───────────────────────────────────────
        // When the Playground loads this index.html in an iframe with
        // `?preview`, mirror Export.Web's iframe protocol so the same runner
        // surface in main.ts drives both targets. Wire-protocol mapping:
        //
        //   parent → iframe:                  → JSInvokable on Index.razor.cs
        //   ───────────────────────────────────────────────────────────────
        //   bootstrap                         no-op (libraries baked-in)
        //                                      reply: { type: 'preview-armed' }
        //   run-start-source { source, id }   LoadProgram(source)
        //                                      reply: { type: 'run-tick-result',
        //                                               id, result: JSON.stringify({ ok, done }) }
        //   stop-run                          StopGame()
        //   list-tests { source, id }         ListTests(source)
        //                                      reply: { type: 'list-tests-result',
        //                                               id, result: <json from ListTests> }
        //   run-tests { source, testName, id} RunTests(source, testName)
        //                                      reply: { type: 'run-tests-result',
        //                                               id, result: <json from RunTests> }
        //
        // Drains debug events through window.onMonoGameDebugEvent (set
        // below) which fire from tickJS's TickDotNet return value.
        //
        // MonoGame's libraries (FadeMonoGameCommands + StandardCommands)
        // are baked in — there's no command-DLL hot-load surface like
        // Export.Web. So the bootstrap step is a no-op handshake purely
        // for protocol symmetry with the iframe lifecycle main.ts already
        // implements.
        if (new URLSearchParams(location.search).has('preview')) {
            const waitForInstance = () => new Promise((resolve) => {
                const tick = () => {
                    if (window.theInstance) resolve();
                    else setTimeout(tick, 50);
                };
                tick();
            });

            // tickJS calls this every frame for each debug event TickDotNet
            // produced. In preview mode, forward to the Playground so its
            // debug control bar (breakpoint hit, scope, etc.) updates.
            // Wrapped in a `debug-event` envelope so the parent's message
            // listener can distinguish protocol replies (run-tick-result,
            // debug-scopes-result, etc.) from streaming debug events —
            // both kinds have a `type` field, and inner debug-event types
            // ('REV_REQUEST_BREAKPOINT', 'PROTO_ACK', …) would otherwise
            // collide with the reserved protocol names.
            window.onMonoGameDebugEvent = (evt) => {
                try { window.parent.postMessage({ type: 'debug-event', event: evt }, '*'); }
                catch { /* parent may be cross-origin */ }
            };

            // Helper: invoke a JSInvokable and reply with an id-correlated
            // result envelope. `replyType` is the parent-facing message
            // type the Playground correlates on.
            const invokeAndReply = async (replyType, id, method, ...args) => {
                const result = await window.theInstance.invokeMethodAsync(method, ...args);
                window.parent.postMessage({ type: replyType, id, result }, '*');
            };

            const handleParent = async (m) => {
                if (!m || !m.type) return;
                try {
                    switch (m.type) {
                        case 'pg-splash-hidden':
                            // Parent Playground page's boot splash has finished
                            // dimming out. Un-pause our animations now so both
                            // splashes are never visible at the same time.
                            document.getElementById('fade-splash')?.classList.remove('splash-anim-paused');
                            return;

                        case 'bootstrap':
                            // commandDlls intentionally ignored — monogame
                            // libraries are statically referenced. Reply
                            // armed so the parent's bootstrap promise
                            // resolves and run/test traffic can begin.
                            window.parent.postMessage({ type: 'preview-armed' }, '*');
                            return;

                        // ── Run lifecycle ─────────────────────────────────
                        case 'run-start-source': {
                            if (window.__fadeSplash && !window.__fadeSplash.isHidden())
                                window.__fadeSplash.setStatus('Loading program…');
                            const ok = await window.theInstance.invokeMethodAsync('LoadProgram', m.source);
                            // A prior fatal tick error parked the rAF
                            // loop; a fresh LoadProgram is the user
                            // saying "try again", so re-arm it.
                            if (ok && tickHalted) {
                                tickHalted = false;
                                window.requestAnimationFrame(tickJS);
                            }
                            // First successful LoadProgram fades out the
                            // friendly splash. Subsequent Reset clicks
                            // are no-ops (the splash has already gone).
                            if (ok && window.__fadeSplash) {
                                window.__fadeSplash.hide();
                            }
                            window.parent.postMessage({
                                type: 'run-tick-result',
                                id: m.id,
                                result: JSON.stringify({ ok, done: ok }),
                            }, '*');
                            return;
                        }
                        case 'stop-run':
                            await window.theInstance.invokeMethodAsync('StopGame');
                            return;
                        case 'get-version-info':
                            await invokeAndReply('get-version-info-result', m.id, 'GetVersionInfo');
                            return;

                        // ── Asset management ──────────────────────────────
                        // The Playground pushes each .xnb's bytes before
                        // running a monogame project so `texture` / `load
                        // sfx clip` resolve against an in-memory dict.
                        case 'register-asset':
                            if (window.__fadeSplash && !window.__fadeSplash.isHidden()) {
                                // We can't distinguish texture vs SpriteFont
                                // XNBs from JS without parsing the header;
                                // call it "asset" so both look right.
                                window.__fadeSplash.setStatus(`Loading asset: ${m.name}…`);
                            }
                            await window.theInstance.invokeMethodAsync('RegisterAsset', m.name, m.bytes);
                            return;
                        case 'clear-assets':
                            await window.theInstance.invokeMethodAsync('ClearAssets');
                            // Also wipe the Web Audio host — the audio path
                            // bypasses MonoGame's content manager so clearing
                            // only the texture dict would leave stale decoded
                            // AudioBuffers + live SourceNodes hanging around
                            // between Runs.
                            try { window.fadeAudio.clearAssets(); } catch (e) {
                                console.warn('[fade-audio] clearAssets:', e);
                            }
                            return;

                        // ── Audio assets (Web Audio path) ────────────────
                        // Browser-native audio replaces MonoGame's
                        // SoundEffect XNB path. `register-audio` hands the
                        // raw source bytes (MP3/OGG/WAV/FLAC/AAC) to the
                        // audio host, which decodes via decodeAudioData and
                        // stores the resulting AudioBuffer keyed by name.
                        // Reply is id-correlated so the playground can
                        // await decode completion before unblocking
                        // BeginPendingProgram.
                        // Selective eviction — playground sends these
                        // when an asset's source bytes have changed (or
                        // the file was deleted) and the existing
                        // cached Texture2D / SpriteFont / AudioBuffer
                        // needs to be invalidated. Other registered
                        // assets stay intact.
                        case 'unregister-asset':
                            await window.theInstance.invokeMethodAsync('UnregisterAsset', m.name);
                            return;
                        case 'unregister-audio':
                            try { window.fadeAudio.unregister(m.name); } catch (e) {
                                console.warn('[fade-audio] unregister threw:', e);
                            }
                            return;
                        case 'register-audio': {
                            // Surface decoding progress on the in-canvas
                            // splash so the user sees "what" is loading
                            // (especially helpful for big MP3s that take
                            // a noticeable moment).
                            if (window.__fadeSplash) {
                                window.__fadeSplash.setStatus(`Loading audio: ${m.name}…`);
                            }
                            let ok = false;
                            try {
                                ok = await window.fadeAudio.register(m.name, m.bytes);
                            } catch (e) {
                                console.error('[fade-audio] register threw:', e);
                            }
                            window.parent.postMessage(
                                { type: 'register-audio-result', id: m.id, result: !!ok },
                                '*',
                            );
                            return;
                        }

                        // ── Test discovery / execution ────────────────────
                        case 'list-tests':
                            await invokeAndReply('list-tests-result', m.id, 'ListTests', m.source);
                            return;
                        case 'run-tests':
                            await invokeAndReply('run-tests-result', m.id, 'RunTests', m.source, m.testName ?? '');
                            return;

                        // ── Debug session ─────────────────────────────────
                        // Same wire shape as Export.Web's worker protocol so
                        // main.ts's runner can dispatch identically against
                        // either iframe. monoGameHost.debugStart used to
                        // LoadProgram-then-DebugStart on the page side; we
                        // mirror that two-step here so the iframe protocol
                        // surface stays uniform with Export.Web's
                        // debug-start.
                        case 'debug-start': {
                            if (window.__fadeSplash && !window.__fadeSplash.isHidden())
                                window.__fadeSplash.setStatus('Loading program…');
                            const compileOk = await window.theInstance.invokeMethodAsync('LoadProgram', m.source);
                            if (compileOk && tickHalted) {
                                tickHalted = false;
                                window.requestAnimationFrame(tickJS);
                            }
                            if (compileOk && window.__fadeSplash) {
                                window.__fadeSplash.hide();
                            }
                            const result = compileOk
                                ? await window.theInstance.invokeMethodAsync('DebugStart')
                                : JSON.stringify({ ok: false, error: 'compile failed', statementLines: [] });
                            window.parent.postMessage({
                                type: 'debug-start-result',
                                id: m.id,
                                result,
                            }, '*');
                            return;
                        }
                        case 'debug-start-test':
                            if (tickHalted) {
                                tickHalted = false;
                                window.requestAnimationFrame(tickJS);
                            }
                            if (window.__fadeSplash) window.__fadeSplash.hide();
                            await invokeAndReply('debug-start-test-result', m.id, 'DebugStartTest', m.source, m.testName ?? '');
                            return;
                        // ── Two-phase compile/run (asset-aware loop) ─────
                        // The playground uses these in place of run-start-source
                        // when it needs to register PNG-compiled XNBs from the
                        // macro pass's plan before the program ticks.
                        case 'compile-for-run':
                            // Re-display the splash on every Run so the
                            // asset-loading window (decode MP3s, register
                            // textures) is visible inside the game canvas
                            // instead of a frozen previous frame.
                            if (window.__fadeSplash) {
                                window.__fadeSplash.show();
                                window.__fadeSplash.setStatus('Compiling…');
                            }
                            await invokeAndReply('compile-for-run-result', m.id, 'CompileForRun', m.source);
                            return;
                        case 'get-content-build-plan':
                            await invokeAndReply('get-content-build-plan-result', m.id, 'GetContentBuildPlan');
                            return;
                        case 'begin-pending-program':
                            // Mirrors run-start-source's tickHalted + splash
                            // bookkeeping so the second phase finishes the
                            // boot the user expects to see.
                            if (tickHalted) {
                                tickHalted = false;
                                window.requestAnimationFrame(tickJS);
                            }
                            if (window.__fadeSplash) window.__fadeSplash.hide();
                            await invokeAndReply('begin-pending-program-result', m.id, 'BeginPendingProgram');
                            return;
                        case 'debug-terminate':
                            await window.theInstance.invokeMethodAsync('DebugTerminate');
                            return;
                        case 'get-debug-test-result':
                            // Snapshot the just-finished debug-test outcome
                            // so the playground can flip the test row from
                            // 'running' to 'pass'/'fail' instead of falling
                            // back to the purple 'stopped' safety branch.
                            await invokeAndReply('get-debug-test-result-result', m.id, 'GetDebugTestResult');
                            return;
                        case 'debug-set-breakpoints':
                            await window.theInstance.invokeMethodAsync('DebugSetBreakpoints', m.linesJson ?? '[]');
                            return;
                        case 'debug-step':
                            await window.theInstance.invokeMethodAsync('DebugStep', m.kind ?? 'over');
                            return;
                        case 'debug-continue':
                            await window.theInstance.invokeMethodAsync('DebugContinue');
                            return;
                        case 'debug-pause':
                            await window.theInstance.invokeMethodAsync('DebugPause');
                            return;
                        case 'debug-stack-frames':
                            await invokeAndReply('debug-stack-frames-result', m.id, 'DebugStackFrames');
                            return;
                        case 'debug-resolve-instruction':
                            await invokeAndReply('debug-resolve-instruction-result', m.id, 'DebugResolveInstruction', m.insIndex | 0);
                            return;
                        case 'debug-scopes':
                            await invokeAndReply('debug-scopes-result', m.id, 'DebugScopes', m.frameId | 0);
                            return;
                        case 'debug-variable-expansion':
                            await invokeAndReply('debug-variable-expansion-result', m.id, 'DebugVariableExpansion', m.variableId | 0);
                            return;
                        case 'debug-eval':
                            await invokeAndReply('debug-eval-result', m.id, 'DebugEval', m.frameId | 0, m.expression ?? '');
                            return;
                        case 'debug-repl':
                            await invokeAndReply('debug-repl-result', m.id, 'DebugRepl', m.frameId | 0, m.code ?? '');
                            return;
                        case 'debug-set-variable':
                            await invokeAndReply('debug-set-variable-result', m.id, 'DebugSetVariable',
                                m.frameId | 0, m.variableId | 0, m.rhs ?? '');
                            return;

                        // ── Game-loop lifecycle ──────────────────────────
                        // pause-tick / resume-tick let the Playground free
                        // up rAF cycles when the editor takes focus, so
                        // Monaco's own rAF work (cursor blink, decoration
                        // refresh, hover) doesn't have to fight KNI for
                        // the frame budget. set-muted drives the Web Audio
                        // master gain — fadeAudio.setMuted is idempotent
                        // and tolerates being called before the context
                        // is built.
                        case 'pause-tick':
                            tickHalted = true;
                            return;
                        case 'resume-tick':
                            if (tickHalted) {
                                tickHalted = false;
                                window.requestAnimationFrame(tickJS);
                            }
                            return;
                        case 'set-muted':
                            try { window.fadeAudio.setMuted(!!m.muted); }
                            catch (e) { console.warn('[fade-audio] setMuted:', e); }
                            return;

                        // ── Debug UI (Tweakpane in parent) ───────────────
                        // User moved a slider / clicked a button / toggled
                        // a checkbox in the Playground's Debug UI panel.
                        // Hand off to Index.razor.cs's ApplyDebugUiChange,
                        // which writes into DebugUISystem's value dicts so
                        // the next frame's fbasic Push picks up the change
                        // via TryGetPrevious*.
                        case 'debug-ui-change':
                            try {
                                await window.theInstance.invokeMethodAsync(
                                    'ApplyDebugUiChange',
                                    m.ctrlId | 0,
                                    m.kind | 0,
                                    String(m.value ?? ''));
                            } catch (e) {
                                console.warn('[fade-monogame] ApplyDebugUiChange threw:', e);
                            }
                            return;

                        // ── Debug Inspector (DebugRegistry RPC) ─────────
                        // Generic provider surface for the Tweakpane
                        // inspector panel — list/get/set against any
                        // game system that exposes an IDebugProvider.
                        // The C# side returns JSON strings; we forward
                        // them verbatim and the panel parses.
                        case 'debug-list-types':
                            await invokeAndReply('debug-list-types-result', m.id, 'DebugListTypes');
                            return;
                        case 'debug-get-schema':
                            await invokeAndReply('debug-get-schema-result', m.id, 'DebugGetSchema',
                                String(m.typeName ?? ''));
                            return;
                        case 'debug-get-entity-schema':
                            await invokeAndReply('debug-get-entity-schema-result', m.id, 'DebugGetEntitySchema',
                                String(m.typeName ?? ''), m.entityId | 0);
                            return;
                        case 'debug-list-entities':
                            await invokeAndReply('debug-list-entities-result', m.id, 'DebugListEntities',
                                String(m.typeName ?? ''));
                            return;
                        case 'debug-get-labels':
                            await invokeAndReply('debug-get-labels-result', m.id, 'DebugGetLabels',
                                String(m.typeName ?? ''));
                            return;
                        case 'debug-get-entity':
                            await invokeAndReply('debug-get-entity-result', m.id, 'DebugGetEntity',
                                String(m.typeName ?? ''), m.entityId | 0);
                            return;
                        case 'debug-set-field':
                            await invokeAndReply('debug-set-field-result', m.id, 'DebugSetField',
                                String(m.typeName ?? ''), m.entityId | 0,
                                String(m.path ?? ''), String(m.valueJson ?? 'null'));
                            return;

                        case 'debug-ui-subscribe':
                            // Parent toggles this when its Debug UI dock
                            // tab becomes visible / hidden. Two effects:
                            //   1. fadeDebugUi.frame() short-circuits in
                            //      JS when neither this flag nor a local
                            //      overlay panel wants envelopes —
                            //      saves the postMessage + parent parse.
                            //   2. Index.razor's SetDebugUiSubscribed
                            //      JSInvokable flips DebugUISystem.
                            //      IsSubscribed in C# so EndDebug skips
                            //      the entire snapshot pipeline (no
                            //      metadata reflection, no entity
                            //      enumeration, no JSON build). That's
                            //      where the bulk of the per-frame
                            //      cost lives, so this is the larger
                            //      of the two wins. window.theInstance
                            //      may not be ready yet during early
                            //      boot; we catch + ignore — the
                            //      default IsSubscribed = true keeps
                            //      envelopes flowing in that brief
                            //      window.
                            parentSubscribed = !!m.active;
                            try {
                                if (window.theInstance) {
                                    void window.theInstance.invokeMethodAsync('SetDebugUiSubscribed', !!m.active);
                                }
                            } catch { /* not armed yet */ }
                            return;

                        default:
                            console.warn('[fade-monogame preview] unhandled message type:', m.type);
                    }
                } catch (e) {
                    console.error('[fade-monogame preview] handler', m.type, 'threw:', e);
                    window.parent.postMessage({
                        type: 'error',
                        id: m.id,
                        message: e?.message ?? String(e),
                    }, '*');
                }
            };

            // Serialize message processing — handleParent is async (it awaits
            // JSInterop invokeMethodAsync calls), so firing it directly inside
            // the listener spawns parallel handler invocations. That race makes
            // BeginPendingProgram fire *before* the preceding RegisterAsset
            // finishes writing the new shader/texture bytes into
            // BrowserContentManager._assets, so the program restart loads
            // stale bytes. Chain each message onto a queue so they FIFO.
            let _msgQueue = Promise.resolve();
            window.addEventListener('message', (e) => {
                if (e.source !== window.parent) return;
                const data = e.data;
                _msgQueue = _msgQueue
                    .then(() => handleParent(data))
                    .catch((err) => {
                        try { console.error('[fade] handleParent error:', err); } catch {}
                    });
            });

            // Tell parent we're ready as soon as Blazor mounts. Symmetrical
            // with Export.Web's iframe — main.ts's ensureWebPreviewArmed
            // waits for preview-ready before sending bootstrap.
            waitForInstance().then(() => {
                try { window.parent.postMessage({ type: 'preview-ready' }, '*'); }
                catch { /* parent may be cross-origin */ }
            });
        } else {
            // ── Static-host boot ────────────────────────────────────────
            // No `?preview` flag → we're a deployed export (Playground
            // download or `dotnet publish` artifact uploaded to itch.io,
            // GitHub Pages, etc.). Self-bootstrap from fade-manifest.json:
            //
            //   {
            //     "type": "monogame",
            //     "exportFormat": "1",
            //     "source": "program.fbasic",          // file under game/
            //     "assets": ["Goldfish", "Boop", ...]  // bare names
            //   }
            //
            // We wait for Blazor to mount, fetch the source + each XNB
            // asset, register the assets, then call LoadProgram(source).
            // Same JSInvokable the Playground drives via postMessage; the
            // only difference is the parent/iframe protocol is gone here.
            //
            // Source-bundling (vs bytecode) is intentional: LoadProgram
            // already takes a source string and compiles in-runtime, so
            // no C# changes are needed and the export pipeline stays
            // symmetrical between the Playground download and the
            // FadeBasic.Export.MonoGame MSBuild target.
            const waitForInstanceStandalone = () => new Promise((resolve) => {
                const tick = () => {
                    if (window.theInstance) resolve();
                    else setTimeout(tick, 50);
                };
                tick();
            });
            const splash = window.__fadeSplash;
            (async () => {
                try {
                    // Initial "Booting Fade Basic" text comes from the
                    // HTML. We update through fetch phases so the user
                    // sees forward progress on slow connections.
                    await waitForInstanceStandalone();
                    if (splash) splash.setStatus('Loading game assets…');
                    const manifest = await fetch('fade-manifest.json').then((r) => r.json());
                    if (manifest.type !== 'monogame') {
                        console.warn('[fade-monogame] fade-manifest.json type is not "monogame":', manifest.type);
                    }
                    const sourceFile = manifest.source || 'program.fbasic';
                    const assets = Array.isArray(manifest.assets) ? manifest.assets : [];

                    for (const name of assets) {
                        try {
                            const buf = await fetch(`game/${name}.xnb`).then((r) => r.arrayBuffer());
                            await window.theInstance.invokeMethodAsync('RegisterAsset', name, new Uint8Array(buf));
                        } catch (e) {
                            console.error('[fade-monogame] asset load failed for', name, e);
                        }
                    }

                    if (splash) splash.setStatus('Starting game…');
                    const source = await fetch(`game/${sourceFile}`).then((r) => r.text());
                    const ok = await window.theInstance.invokeMethodAsync('LoadProgram', source);
                    if (!ok) {
                        if (splash) splash.setStatus('Failed to start — see browser console.', true);
                        console.error('[fade-monogame] LoadProgram returned false — compile failed.');
                        return;
                    }
                    // Give the game a couple of frames to draw its first
                    // scene before fading out the splash — otherwise the
                    // user sees the splash vanish to a black canvas
                    // before the first sync.
                    setTimeout(() => { if (splash) splash.hide(); }, 350);
                } catch (e) {
                    if (splash) splash.setStatus('Failed to load — see browser console.', true);
                    console.error('[fade-monogame] standalone boot failed:', e);
                }
            })();
        }
    </script>

</body>

</html>
